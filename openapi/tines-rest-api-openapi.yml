                $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    put:
      operationId: updateTag
      summary: Update a tag
      description: Updates an existing tag by ID.
      tags: [Tags]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '200':
          description: Tag updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      operationId: deleteTag
      summary: Delete a tag
      description: Deletes a tag by ID.
      tags: [Tags]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Tag deleted successfully

# ─── Cases (v2) ────────────────────────────────────────────────────────────────
# Note: Cases use /api/v2 base path

        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Bearer token authentication using an Tines API key.
        Format: `Authorization: Bearer <api_key>`
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-User-Token
      description: >-
        API key authentication using the X-User-Token header.
        Format: `X-User-Token: <api_key>`

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: The unique numeric identifier of the resource
      schema:
        type: integer
    Page:
      name: page
      in: query
      description: Page number for pagination (default 1)
      schema:
        type: integer
        default: 1
    PerPage:
      name: per_page
      in: query
      description: Number of results per page (default 20, max 500)
      schema:
        type: integer
        default: 20
        maximum: 500

  schemas:
    PaginatedMeta:
      type: object
      properties:
        meta:
          type: object
          properties:
            current_page:
              type: integer
            previous_page:
              type: integer
              nullable: true
            next_page:
              type: integer
              nullable: true
            next_page_number:
              type: integer
              nullable: true
            per_page:
              type: integer
            pages:
              type: integer
            count:
              type: integer

    Story:
      type: object
      properties:
        id:
          type: integer
          description: Unique story identifier
        name:
          type: string
          description: Story name
        description:
          type: string
          description: User-defined description
        team_id:
          type: integer
          description: ID of the team that owns the story
        folder_id:
          type: integer
          nullable: true
          description: ID of the folder containing the story
        guid:
          type: string
          description: Globally unique story identifier
        slug:
          type: string
          description: URL-friendly story identifier
        published:
          type: boolean
          description: Whether the story is published
        disabled:
          type: boolean
          description: Whether the story is disabled
        priority:
          type: boolean
          description: Whether the story is high-priority
        keep_events_for:
          type: integer
          description: Event retention period in seconds
        tags:
          type: array
          items:
            type: string
          description: Tags associated with the story
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time

    StoryCreate:
      type: object
      required: [team_id]
      properties:
        team_id:
          type: integer
          description: ID of the team to which the story should be added
        name:
          type: string
          description: Story name
        description:
          type: string
          description: User-defined description
        keep_events_for:
          type: integer
          description: Event retention in seconds (3600 to 31536000)
          minimum: 3600
          maximum: 31536000
        folder_id:
          type: integer
          description: Folder ID for organization
        tags:
          type: array
          items:
            type: string
          description: Array of strings used to create tags
        disabled:
          type: boolean
          description: Story enabled status
          default: false
        priority:
          type: boolean
          description: High priority flag
          default: false

    Action:
      type: object
      properties:
        id:
          type: integer
          description: Unique action identifier
        guid:
          type: string
          description: Globally unique action identifier
        type:
          type: string
          description: Action type (e.g. Agents::HTTPRequestAgent)
        name:
          type: string
          description: Action name
        description:
          type: string
          description: User-defined description
        story_id:
          type: integer
          description: ID of the parent story
        group_id:
          type: integer
          nullable: true
          description: ID of the parent group
        team_id:
          type: integer
          description: ID of the owning team
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
          description: Canvas position coordinates
        options:
          type: object
          description: Action-type-specific configuration
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_event_at:
          type: string
          format: date-time
          nullable: true

    ActionCreate:
      type: object
      required: [type, name, options, position]
      properties:
        type:
          type: string
          description: Action type identifier
          example: Agents::HTTPRequestAgent
        name:
          type: string
          description: Name of the action
        options:
          type: object
          description: Configuration block for the action
        position:
          type: object
          required: [x, y]
          properties:
            x:
              type: number
            y:
              type: number
        story_id:
          type: integer
          description: Story ID to add the action to
        group_id:
          type: integer
          description: Group ID to add the action to
        description:
          type: string
        disabled:
          type: boolean
          default: false
        source_ids:
          type: array
          items:
            type: integer
          description: Action IDs to receive events from
        receiver_ids:
          type: array
          items:
            type: integer
          description: Action IDs to emit events to
        monitor_failures:
          type: boolean
        monitor_all_events:
          type: boolean
        monitor_no_events_emitted:
          type: integer
          description: Duration in seconds before notification

    Credential:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        mode:
          type: string
          enum: [AWS, TEXT, HTTP_REQUEST_AGENT, JWT, OAUTH2, MTLS]
        team_id:
          type: integer
        folder_id:
          type: integer
          nullable: true
        read_access:
          type: string
          enum: [TEAM, GLOBAL, SPECIFIC_TEAMS]
        shared_team_slugs:
          type: array
          items:
            type: string
        slug:
          type: string
        description:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        metadata:
          type: object
        owner:
          type: object
          properties:
            user_id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
            email:
              type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        expiry_notifications_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CredentialCreate:
      type: object
      required: [name, mode, team_id]
      properties:
        name:
          type: string
          description: Credential name
        mode:
          type: string
          enum: [AWS, TEXT, HTTP_REQUEST_AGENT, JWT, OAUTH2, MTLS]
          description: Credential type
        team_id:
          type: integer
          description: Team ID where credential resides
        aws_authentication_type:
          type: string
          enum: [KEY, ROLE, INSTANCE_PROFILE]
          description: AWS authentication type (required when mode is AWS)
        aws_access_key:
          type: string
          description: AWS access key ID
        aws_secret_key:
          type: string
          description: AWS secret access key
        aws_assumed_role_arn:
          type: string
          description: Required if aws_authentication_type is ROLE
        use_static_external_id:
          type: boolean
          description: Enable team-scoped static external ID
        folder_id:
          type: integer
          description: Folder location ID
        read_access:
          type: string
          enum: [TEAM, GLOBAL, SPECIFIC_TEAMS]
          default: TEAM
        shared_team_slugs:
          type: array
          items:
            type: string
        description:
          type: string
        metadata:
          type: object
        allowed_hosts:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        expiry_notifications_enabled:
          type: boolean
          default: false
        credential_notification_recipient_user_ids:
          type: array
          items:
            type: integer

    Team:
      type: object
      properties:
        id:
          type: integer
          description: Unique team identifier
        name:
          type: string
          description: Team name

    Folder:
      type: object
      properties:
        id:
          type: integer
          description: Unique folder identifier
        name:
          type: string
          description: Folder name
        content_type:
          type: string
          enum: [CREDENTIAL, RESOURCE, STORY]
          description: Type of content stored in this folder
        team_id:
          type: integer
          description: ID of team to which the folder belongs
        size:
          type: integer
          description: Number of items in this folder
        parent_folder_id:
          type: integer
          nullable: true
          description: ID of the parent folder, or null if at root level

    FolderCreate:
      type: object
      required: [name, content_type, team_id]
      properties:
        name:
          type: string
          description: The folder name
        content_type:
          type: string
          enum: [CREDENTIAL, RESOURCE, STORY]
          description: Accepts CREDENTIAL, RESOURCE, or STORY
        team_id:
          type: integer
          description: ID of team receiving the folder
        parent_folder_id:
          type: integer
          nullable: true
          description: ID of the parent folder; default null (root level)

    AuditLog:
      type: object
      properties:
        id:
          type: integer
          description: Unique audit log entry identifier
        created_at:
          type: string
          format: date-time
          description: When the event occurred
        operation_name:
          type: string
          description: The type of operation logged (e.g. StoryCreation, ActionRun)
        user_id:
          type: integer
          description: ID of the user who performed the action
        user_email:
          type: string
          description: Email of the user who performed the action
        user_name:
          type: string
          description: Name of the user who performed the action
        tenant_id:
          type: integer
          description: Tenant ID where the action occurred
        request_ip:
          type: string
          description: IP address of the request
        request_user_agent:
          type: string
          description: User agent string of the request
        inputs:
          type: object
          description: Parameters associated with the operation

    Tag:
      type: object
      properties:
        id:
          type: integer
          description: Unique tag identifier
        name:
          type: string
          description: Tag name
        color:
          type: string
          description: Tag color in hex format (e.g. #FF8888)
        teams:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          description: Teams this tag belongs to
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TagCreate:
      type: object
      required: [name, team_id, color]
      properties:
        name:
          type: string
          description: Tag name
        team_id:
          type: integer
          description: ID of the team to which the tag belongs
        color:
          type: string
          description: >-
            Tag color - one of purple, blue, gold, green, magenta, red,
            orange, mint, or a hex format like #RRGGBB

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message describing the issue

  responses:
    Unauthorized:
      description: Authentication credentials missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Validation error — one or more request parameters are invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
